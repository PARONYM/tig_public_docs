title: ドキュメント   # ヘッダーはロゴ画像(headerLogo)＋この文字を両方表示（custom.scss .site-title::before）
description: Tig プラットフォーム 顧客向け機能仕様書
theme: just-the-docs

# プロジェクトPages（https://paronym.github.io/tig_public_docs/）用。
# Actions の build 時に --baseurl が渡され上書きされるが、整合のため明示しておく。
url: https://paronym.github.io
baseurl: /tig_public_docs
lang: ja   # <html lang="ja"> を出力。Pagefind の日本語(CJK)分割に必要

# 検索は Pagefind（ビルド後に _site を索引化・日本語/CJK対応）に置き換え。
# Just the Docs 標準の lunr 検索は無効化し、検索UIは search.md にマウントする。
search_enabled: false

color_scheme: light
heading_anchors: true

# 全ページに Just the Docs のレイアウトを適用する。
# これが無いと layout 未指定のサブディレクトリ配下mdが素のHTML（テーマ未適用）になる。
defaults:
  - scope:
      path: ""
    values:
      layout: default

footer_content: "© PARONYM Inc. — 顧客向け機能仕様（自動生成・試験運用中）"

# サイト出力に含めないもの（ソース管理用ファイル等）
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
  - .bundle
